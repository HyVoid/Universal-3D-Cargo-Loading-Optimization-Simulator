<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 装载优化模拟器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:       #F2F0E9;
            --navy:     #051C2C;
            --blue:     #2251FF;
            --panel:    #FFFFFF;
            --border:   rgba(5, 28, 44, 0.09);
            --border-s: rgba(5, 28, 44, 0.05);
            --muted:    rgba(5, 28, 44, 0.42);
            --subtle:   rgba(5, 28, 44, 0.055);
            --blue-dim: rgba(34, 81, 255, 0.08);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            overflow: hidden;
            background: var(--bg);
            font-family: '等线', 'DengXian', 'Noto Sans SC', 'PingFang SC',
                         -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        #canvas-container { width: 100vw; height: 100vh; display: block; }

        /* ── Panel ── */
        .ui-panel {
            position: absolute;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.4rem 1.5rem;
            pointer-events: auto;
            max-height: 95vh;
            overflow-y: auto;
            box-shadow: 0 2px 16px rgba(5,28,44,0.07), 0 0 0 0.5px var(--border);
        }

        .ui-panel::-webkit-scrollbar { width: 4px; }
        .ui-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        .ui-panel::-webkit-scrollbar-track { background: transparent; }

        /* ── Typography ── */
        .panel-title {
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: var(--navy);
            margin: 0 0 0.2rem;
        }
        .panel-sub {
            font-size: 0.7rem;
            font-weight: 400;
            color: var(--muted);
            letter-spacing: 0.02em;
            margin: 0 0 1.4rem;
        }

        /* ── Section block ── */
        .section-block {
            background: var(--subtle);
            border: 1px solid var(--border-s);
            border-radius: 8px;
            padding: 0.85rem 1rem;
            margin-bottom: 0.75rem;
        }

        .section-label {
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            margin: 0 0 0.65rem;
        }

        /* ── Input grid ── */
        .input-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
        }

        .input-group label {
            display: block;
            font-size: 0.62rem;
            letter-spacing: 0.05em;
            color: var(--muted);
            margin-bottom: 0.25rem;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.35rem 0.5rem;
            font-size: 0.78rem;
            font-family: inherit;
            color: var(--navy);
            outline: none;
            transition: border-color 0.15s;
            -moz-appearance: textfield;
        }
        .input-group input::-webkit-inner-spin-button,
        .input-group input::-webkit-outer-spin-button { -webkit-appearance: none; }
        .input-group input:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px var(--blue-dim);
        }

        .input-group input.accent-h {
            border-color: rgba(34,81,255,0.25);
            background: rgba(34,81,255,0.03);
        }

        /* ── Rule note ── */
        .rule-note {
            font-size: 0.62rem;
            color: var(--muted);
            line-height: 1.5;
            margin: 0 0 0.65rem;
        }

        /* ── Target input ── */
        .target-wrap { margin-bottom: 0.85rem; }
        .target-wrap label {
            display: block;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 0.35rem;
        }
        .target-wrap input {
            width: 100%;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.4rem 0.6rem;
            font-size: 0.8rem;
            font-family: inherit;
            color: var(--navy);
            outline: none;
            transition: border-color 0.15s;
            -moz-appearance: textfield;
        }
        .target-wrap input::-webkit-inner-spin-button,
        .target-wrap input::-webkit-outer-spin-button { -webkit-appearance: none; }
        .target-wrap input:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px var(--blue-dim);
        }
        .target-hint {
            font-size: 0.6rem;
            color: var(--muted);
            margin: 0.25rem 0 0;
        }

        /* ── CTA button ── */
        .btn-run {
            width: 100%;
            background: var(--blue);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 0.65rem 1rem;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.01em;
            font-family: inherit;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
            outline: none;
        }
        .btn-run:hover  { opacity: 0.88; }
        .btn-run:active { transform: scale(0.98); }

        /* ── Divider ── */
        .divider {
            height: 1px;
            background: var(--border);
            margin: 1.1rem 0;
        }

        /* ── Results ── */
        .results-title {
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            margin: 0 0 0.75rem;
        }

        .res-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 0.45rem 0;
            border-bottom: 1px solid var(--border-s);
        }
        .res-row:last-child { border-bottom: none; }

        .res-key {
            font-size: 0.72rem;
            color: var(--muted);
        }
        .res-val {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--navy);
            letter-spacing: -0.01em;
        }
        .res-val.accent   { color: var(--blue); }
        .res-val.positive { color: #0A9960; }
        .res-val.warning  { color: #D64B1E; }

        /* ── Legend ── */
        .legend-block {
            background: var(--subtle);
            border: 1px solid var(--border-s);
            border-radius: 6px;
            padding: 0.6rem 0.75rem;
            margin-top: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        .legend-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.65rem;
            color: var(--muted);
        }
        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 2px;
            flex-shrink: 0;
        }
        .dot-a { background: #2251FF; }
        .dot-b { background: #5077FF; }

        /* ── Lang switcher ── */
        #lang-switcher {
            position: absolute;
            top: 1rem;
            right: 1rem;
            display: flex;
            gap: 2px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 3px;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(5,28,44,0.06);
        }
        .lang-btn {
            padding: 0.2rem 0.6rem;
            border-radius: 5px;
            font-size: 0.68rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            color: var(--muted);
            background: transparent;
            font-family: inherit;
            transition: all 0.15s;
            letter-spacing: 0.03em;
        }
        .lang-btn:hover { color: var(--navy); background: var(--subtle); }
        .lang-btn.active {
            background: var(--navy);
            color: #fff;
        }

        /* ── Camera hint ── */
        #camera-hint {
            position: absolute;
            bottom: 1.25rem;
            left: 50%;
            transform: translateX(-50%);
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 0.3rem 1rem;
            font-size: 0.65rem;
            color: var(--muted);
            pointer-events: none;
            letter-spacing: 0.03em;
            box-shadow: 0 2px 8px rgba(5,28,44,0.06);
        }

        /* ── RTL ── */
        .panel-rtl { direction: rtl; text-align: right; }
        .panel-rtl input { text-align: right; }
    </style>
</head>
<body>

    <!-- Lang switcher -->
    <div id="lang-switcher">
        <button class="lang-btn active" onclick="setLang('zh')" id="btn-zh">中文</button>
        <button class="lang-btn" onclick="setLang('en')" id="btn-en">EN</button>
        <button class="lang-btn" onclick="setLang('ar')" id="btn-ar">عربي</button>
    </div>

    <!-- Left panel -->
    <div class="ui-panel" style="top:1rem;left:1rem;width:300px;" id="main-panel">

        <h1 class="panel-title" data-i18n="title">3D 装载优化模拟器</h1>
        <p class="panel-sub" data-i18n="subtitle">宽度零间隙防晃动算法</p>

        <!-- Container dims -->
        <div class="section-block">
            <p class="section-label" data-i18n="containerTitle">货柜内径尺寸 (cm)</p>
            <div class="input-grid">
                <div class="input-group">
                    <label data-i18n="labelL">长度 L</label>
                    <input type="number" id="c_l" value="1730">
                </div>
                <div class="input-group">
                    <label data-i18n="labelW">宽度 W</label>
                    <input type="number" id="c_w" value="280">
                </div>
                <div class="input-group">
                    <label data-i18n="labelH">高度 H</label>
                    <input type="number" id="c_h" value="275">
                </div>
            </div>
        </div>

        <!-- Box dims -->
        <div class="section-block">
            <p class="section-label" data-i18n="boxTitle">单一产品尺寸 (cm)</p>
            <p class="rule-note" data-i18n="boxRule">高度方向固定朝上，长宽可互换以自适应货柜宽度。</p>
            <div class="input-grid">
                <div class="input-group">
                    <label data-i18n="labelL">长度 L</label>
                    <input type="number" id="b_l" value="47.5">
                </div>
                <div class="input-group">
                    <label data-i18n="labelW">宽度 W</label>
                    <input type="number" id="b_w" value="22.5">
                </div>
                <div class="input-group">
                    <label data-i18n="fixedH">高度 H ↑</label>
                    <input type="number" id="b_h" value="34.0" class="accent-h">
                </div>
            </div>
        </div>

        <!-- Target count -->
        <div class="target-wrap">
            <label data-i18n="targetLabel">目标装箱总数</label>
            <input type="number" id="target_count" value="2751"
                   data-i18n-placeholder="targetPlaceholder"
                   placeholder="留空则计算物理最大容量">
            <p class="target-hint" data-i18n="targetHint">空或 0 = 自动排满整个货柜</p>
        </div>

        <button class="btn-run" onclick="runSimulation()" data-i18n="btnRun">
            生成最优 3D 方案
        </button>

        <!-- Results -->
        <div id="results-panel" style="display:none;">
            <div class="divider"></div>
            <p class="results-title" data-i18n="resultsTitle">排布计算结果</p>

            <div class="res-row">
                <span class="res-key" data-i18n="resCountLabel">实际装载数量</span>
                <span class="res-val accent" id="res_count">—</span>
            </div>
            <div class="res-row">
                <span class="res-key" data-i18n="resMaxLabel">理论最大容量</span>
                <span class="res-val" id="res_max">—</span>
            </div>
            <div class="res-row">
                <span class="res-key" data-i18n="resGapLabel">货柜宽度间隙</span>
                <span class="res-val" id="res_gap">—</span>
            </div>
            <div class="res-row">
                <span class="res-key" data-i18n="resLenLabel">占用总长度</span>
                <span class="res-val" id="res_len">—</span>
            </div>
            <div class="res-row">
                <span class="res-key" data-i18n="resLeftLabel">尾部距门剩余</span>
                <span class="res-val" id="res_left">—</span>
            </div>

            <div class="legend-block">
                <div class="legend-row">
                    <span class="legend-dot dot-a"></span>
                    <span id="legend_A">A 区</span>
                </div>
                <div class="legend-row">
                    <span class="legend-dot dot-b"></span>
                    <span id="legend_B">B 区</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Camera hint -->
    <div id="camera-hint" data-i18n="cameraHint">左键旋转 · 右键平移 · 滚轮缩放</div>

    <div id="canvas-container"></div>

<script>
// ─────────────────────────────────────────
// i18n
// ─────────────────────────────────────────
const TRANSLATIONS = {
    zh: {
        title:            "3D 装载优化模拟器",
        subtitle:         "宽度零间隙防晃动算法",
        containerTitle:   "货柜内径尺寸 (cm)",
        labelL: "长度 L", labelW: "宽度 W", labelH: "高度 H",
        boxTitle:         "单一产品尺寸 (cm)",
        boxRule:          "高度方向固定朝上，长宽可互换以自适应货柜宽度。",
        fixedH:           "高度 H ↑",
        targetLabel:      "目标装箱总数",
        targetPlaceholder:"留空则计算物理最大容量",
        targetHint:       "空或 0 = 自动排满整个货柜",
        btnRun:           "生成最优 3D 方案",
        resultsTitle:     "排布计算结果",
        resCountLabel:    "实际装载数量",
        resMaxLabel:      "理论最大容量",
        resGapLabel:      "货柜宽度间隙",
        resLenLabel:      "占用总长度",
        resLeftLabel:     "尾部距门剩余",
        unitBox: "箱", unitCm: "cm",
        perfectGap: "（零间隙）", hasGap: "（有缝隙）",
        legendA: "A 区：宽 {bW} / 纵深 {bL}，共 {n} 列",
        legendB: "B 区：宽 {bL} / 纵深 {bW}，共 {n} 列",
        cameraHint: "左键旋转 · 右键平移 · 滚轮缩放",
        htmlLang: "zh-CN", dir: "ltr",
    },
    en: {
        title:            "3D Load Optimization",
        subtitle:         "Zero-Gap Anti-Shake Width Algorithm",
        containerTitle:   "Container Inner Dimensions (cm)",
        labelL: "Length L", labelW: "Width W", labelH: "Height H",
        boxTitle:         "Single Product Dimensions (cm)",
        boxRule:          "Height is fixed upright. Length/Width may swap to fit container width.",
        fixedH:           "Height H ↑",
        targetLabel:      "Target Box Count",
        targetPlaceholder:"Leave blank for max capacity",
        targetHint:       "0 or blank = fill the entire container",
        btnRun:           "Generate Optimal 3D Layout",
        resultsTitle:     "Layout Results",
        resCountLabel:    "Actual Load Count",
        resMaxLabel:      "Theoretical Maximum",
        resGapLabel:      "Container Width Gap",
        resLenLabel:      "Total Length Used",
        resLeftLabel:     "Remaining (rear to door)",
        unitBox: "boxes", unitCm: "cm",
        perfectGap: "(zero-gap)", hasGap: "(gap exists)",
        legendA: "Zone A: W{bW} / D{bL}, {n} cols",
        legendB: "Zone B: W{bL} / D{bW}, {n} cols",
        cameraHint: "Left-drag: Rotate · Right-drag: Pan · Scroll: Zoom",
        htmlLang: "en", dir: "ltr",
    },
    ar: {
        title:            "محاكي التحميل ثلاثي الأبعاد",
        subtitle:         "خوارزمية الملء الصفري لمنع الاهتزاز",
        containerTitle:   "الأبعاد الداخلية للحاوية (سم)",
        labelL: "الطول L", labelW: "العرض W", labelH: "الارتفاع H",
        boxTitle:         "أبعاد المنتج الواحد (سم)",
        boxRule:          "الارتفاع ثابت للأعلى. يمكن تبديل الطول/العرض لملاءمة عرض الحاوية.",
        fixedH:           "ارتفاع ثابت ↑",
        targetLabel:      "العدد المستهدف",
        targetPlaceholder:"اتركه فارغاً للحد الأقصى",
        targetHint:       "0 أو فارغ = ملء الحاوية بالكامل",
        btnRun:           "توليد المخطط الأمثل",
        resultsTitle:     "نتائج الترتيب",
        resCountLabel:    "العدد الفعلي",
        resMaxLabel:      "الحد الأقصى النظري",
        resGapLabel:      "فجوة عرض الحاوية",
        resLenLabel:      "إجمالي الطول المستخدم",
        resLeftLabel:     "المتبقي (من المؤخرة للباب)",
        unitBox: "صندوق", unitCm: "سم",
        perfectGap: "(بدون فجوة)", hasGap: "(توجد فجوة)",
        legendA: "المنطقة أ: ع{bW} / ع{bL} ({n} أعمدة)",
        legendB: "المنطقة ب: ع{bL} / ع{bW} ({n} أعمدة)",
        cameraHint: "يسار: دوران · يمين: تحريك · عجلة: تكبير",
        htmlLang: "ar", dir: "rtl",
    }
};

let currentLang = 'zh';

function t(key) {
    return TRANSLATIONS[currentLang][key] || TRANSLATIONS['zh'][key] || key;
}

function setLang(lang) {
    if (!TRANSLATIONS[lang]) return;
    currentLang = lang;
    const tr = TRANSLATIONS[lang];
    document.documentElement.lang = tr.htmlLang;
    ['zh','en','ar'].forEach(l =>
        document.getElementById('btn-'+l).classList.toggle('active', l === lang)
    );
    const panel = document.getElementById('main-panel');
    panel.classList.toggle('panel-rtl', tr.dir === 'rtl');

    document.querySelectorAll('[data-i18n]').forEach(el => {
        const k = el.getAttribute('data-i18n');
        if (tr[k] !== undefined) el.textContent = tr[k];
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const k = el.getAttribute('data-i18n-placeholder');
        if (tr[k] !== undefined) el.placeholder = tr[k];
    });

    if (document.getElementById('results-panel').style.display !== 'none') {
        refreshResultsText();
    }
}

// ─────────────────────────────────────────
// Last result cache
// ─────────────────────────────────────────
let lastResult = null;

function refreshResultsText() {
    if (!lastResult) return;
    const { finalCount, maxCapacity, bestGap, maxUsedX, cL, bL, bW, bestCountW, bestCountL } = lastResult;
    const tr = TRANSLATIONS[currentLang];

    document.getElementById('res_count').textContent = finalCount + ' ' + tr.unitBox;
    document.getElementById('res_max').textContent   = maxCapacity + ' ' + tr.unitBox;

    const gapEl = document.getElementById('res_gap');
    gapEl.textContent = bestGap.toFixed(1) + ' ' + tr.unitCm + '  ' +
        (bestGap === 0 ? tr.perfectGap : tr.hasGap);
    gapEl.className = 'res-val ' + (bestGap === 0 ? 'positive' : '');

    document.getElementById('res_len').textContent = maxUsedX.toFixed(1) + ' ' + tr.unitCm;

    const leftLen = cL - maxUsedX;
    const leftEl  = document.getElementById('res_left');
    leftEl.textContent = leftLen.toFixed(1) + ' ' + tr.unitCm;
    const tooShort = leftLen < bL && leftLen < bW;
    leftEl.className = 'res-val ' + (tooShort ? 'warning' : 'positive');

    document.getElementById('legend_A').textContent =
        tr.legendA.replace('{bW}',bW).replace('{bL}',bL).replace('{n}',bestCountW);
    document.getElementById('legend_B').textContent =
        tr.legendB.replace('{bL}',bL).replace('{bW}',bW).replace('{n}',bestCountL);
}

// ─────────────────────────────────────────
// Three.js
// ─────────────────────────────────────────
let scene, camera, renderer, controls;
let cargoGroup = new THREE.Group();

function initScene() {
    const container = document.getElementById('canvas-container');
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0xF2F0E9);

    camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 1, 20000);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputEncoding = THREE.sRGBEncoding;
    container.appendChild(renderer.domElement);

    // Lighting — soft and neutral
    scene.add(new THREE.AmbientLight(0xffffff, 0.75));
    const d1 = new THREE.DirectionalLight(0xffffff, 0.45);
    d1.position.set(3000, 2500, 1500); scene.add(d1);
    const d2 = new THREE.DirectionalLight(0xCCDDFF, 0.2);
    d2.position.set(-800, 800, -1200); scene.add(d2);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.minDistance   = 100;

    scene.add(cargoGroup);

    window.addEventListener('resize', onWindowResize, false);
    animate();
    runSimulation();
}

// ─────────────────────────────────────────
// Core algorithm (unchanged logic)
// ─────────────────────────────────────────
function runSimulation() {
    const cL = parseFloat(document.getElementById('c_l').value);
    const cW = parseFloat(document.getElementById('c_w').value);
    const cH = parseFloat(document.getElementById('c_h').value);
    const bL = parseFloat(document.getElementById('b_l').value);
    const bW = parseFloat(document.getElementById('b_w').value);
    const bH = parseFloat(document.getElementById('b_h').value);
    const raw = parseInt(document.getElementById('target_count').value);
    const targetCount = (isNaN(raw) || raw <= 0) ? Infinity : raw;

    while (cargoGroup.children.length > 0)
        cargoGroup.remove(cargoGroup.children[0]);

    drawContainerBase(cL, cW, cH);

    // Zero-gap width algorithm
    let bestGap = cW, bestCountW = 0, bestCountL = 0;
    for (let i = 0; i <= Math.floor(cW / bW); i++) {
        const j   = Math.floor((cW - i * bW) / bL);
        const gap = cW - (i * bW + j * bL);
        if (gap < bestGap) { bestGap = gap; bestCountW = i; bestCountL = j; }
        if (gap === 0) break;
    }

    const slots = [];
    const maxLayers = Math.floor(cH / bH);

    // Zone A
    const maxDepthA = Math.floor(cL / bL);
    for (let layer = 0; layer < maxLayers; layer++)
        for (let depth = 0; depth < maxDepthA; depth++)
            for (let col = 0; col < bestCountW; col++)
                slots.push({ x: depth*bL, y: col*bW, z: layer*bH, dx: bL, dy: bW, dz: bH, type: 'A' });

    // Zone B
    const maxDepthB   = Math.floor(cL / bW);
    const widthOffsetB = bestCountW * bW;
    for (let layer = 0; layer < maxLayers; layer++)
        for (let depth = 0; depth < maxDepthB; depth++)
            for (let col = 0; col < bestCountL; col++)
                slots.push({ x: depth*bW, y: widthOffsetB+col*bL, z: layer*bH, dx: bW, dy: bL, dz: bH, type: 'B' });

    slots.sort((a, b) => {
        if (Math.abs(a.z - b.z) > 0.01) return a.z - b.z;
        if (Math.abs(a.x - b.x) > 0.01) return a.x - b.x;
        return a.y - b.y;
    });

    const maxCapacity = slots.length;
    const finalCount  = Math.min(targetCount, maxCapacity);
    const finalSlots  = slots.slice(0, finalCount);

    // Materials — navy-blue palette, low noise
    const geoA = new THREE.BoxGeometry(bL - 0.3, bH - 0.3, bW - 0.3);
    const geoB = new THREE.BoxGeometry(bW - 0.3, bH - 0.3, bL - 0.3);
    const matA = new THREE.MeshPhongMaterial({ color: 0x2251FF, shininess: 18, specular: 0x8899FF });
    const matB = new THREE.MeshPhongMaterial({ color: 0x4D72FF, shininess: 18, specular: 0x8899FF });
    const edgeMat = new THREE.LineBasicMaterial({ color: 0x051C2C, opacity: 0.18, transparent: true });
    const eGeoA = new THREE.EdgesGeometry(geoA);
    const eGeoB = new THREE.EdgesGeometry(geoB);

    let maxUsedX = 0;
    finalSlots.forEach(s => {
        const isA = s.type === 'A';
        const mesh = new THREE.Mesh(isA ? geoA : geoB, isA ? matA : matB);
        const px = s.x + s.dx/2, py = s.z + s.dz/2, pz = s.y + s.dy/2;
        mesh.position.set(px, py, pz);
        cargoGroup.add(mesh);
        const edge = new THREE.LineSegments(isA ? eGeoA : eGeoB, edgeMat);
        edge.position.set(px, py, pz);
        cargoGroup.add(edge);
        if (s.x + s.dx > maxUsedX) maxUsedX = s.x + s.dx;
    });

    lastResult = { finalCount, maxCapacity, bestGap, maxUsedX, cL, bL, bW, bestCountW, bestCountL };

    document.getElementById('results-panel').style.display = '';
    refreshResultsText();

    camera.position.set(maxUsedX + 380, cH + 260, cW + 380);
    controls.target.set(maxUsedX/2, cH/2, cW/2);
    controls.update();
}

function drawContainerBase(cL, cW, cH) {
    // Subtle floor grid
    const grid = new THREE.GridHelper(Math.max(cL, cW) * 1.05, 24, 0xC8C6BF, 0xDCDAD3);
    grid.position.set(cL/2, 0, cW/2);
    cargoGroup.add(grid);

    // Container wireframe — navy, low opacity
    const geo  = new THREE.BoxGeometry(cL, cH, cW);
    const edge = new THREE.EdgesGeometry(geo);
    const line = new THREE.LineSegments(edge,
        new THREE.LineBasicMaterial({ color: 0x051C2C, opacity: 0.22, transparent: true }));
    line.position.set(cL/2, cH/2, cW/2);
    cargoGroup.add(line);
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
    requestAnimationFrame(animate);
    if (controls) controls.update();
    if (renderer && scene && camera) renderer.render(scene, camera);
}

window.onload = initScene;
</script>
</body>
